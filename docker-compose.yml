services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: propertyflow-postgres
    environment:
      POSTGRES_USER: propertyflow
      POSTGRES_PASSWORD: propertyflow
      POSTGRES_DB: propertyflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: propertyflow-redis
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: propertyflow-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: PropertyFlow1!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: propertyflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: propertyflow
      MINIO_ROOT_PASSWORD: propertyflow-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  opensearch-data:
  minio-data:

